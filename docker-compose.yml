version: "3.8"

services:
  api-node:
    build:
      context: .
      dockerfile: TF03/backend/Dockerfile
    # ports:
    #   - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  app-node:
    build:
      context: .
      dockerfile: TF03/frontend/Dockerfile
    # ports:
    #   - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./TF03/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app-node:
        condition: service_started
      api-node:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  database:
      image: postgres:alpine

      environment:
        - POSTGRES_DB=blogdb
        - POSTGRES_USER=bloguser
        - POSTGRES_PASSWORD=blogpass

      networks:
        - app-network

      healthcheck:

        test: ["CMD", "pg_isready", "-U", "bloguser", "-d", "blogdb"]
        interval: 10s
        timeout: 5s
        retries: 5

      volumes:
        - db-data:/var/lib/postgresql/data
        - ./TF03/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
        - ./TF03/database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql

volumes:
  db-data:

networks:
  app-network:
    driver: bridge